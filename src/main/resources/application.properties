spring.application.name=literalura

# ==========================================
# CONFIGURAÇĂO DO BANCO DE DADOS (DataSource)
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5435/screenfrases
spring.datasource.username=admin
spring.datasource.password=admin

# ==========================================
# CONFIGURAÇĂO DO JPA / HIBERNATE
# ==========================================

# 'validate': valida se o schema do banco corresponde ŕs entidades.
# 'update': atualiza o schema (bom para desenvolvimento).
# 'create': recria o banco a cada execuçăo (bom para testes).
# 'create-drop': cria e destrói o banco a cada execuçăo.
# 'none': năo faz nada (ideal para produçăo com migrations).
spring.jpa.hibernate.ddl-auto=update

# Ativar a exibiçăo de SQL no console é muito útil para depuraçăo.
spring.jpa.show-sql=true

# Formata o SQL exibido no console para melhor legibilidade.
spring.jpa.properties.hibernate.format_sql=true